<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TerraCycle – Signup</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', sans-serif;
  background-color: #F6FCEB;
  color: #003306;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.top-bar {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 22px 0 18px;
  opacity: 0;
  animation: fadeDown 0.5s ease forwards;
}

.shapes {
  display: flex;
  gap: 6px;
  align-items: center;
}

.sq  { width: 18px; height: 18px; background-color: #540000; }
.circ { width: 16px; height: 16px; background-color: #540000; border-radius: 50%; }
.tri {
  width: 0; height: 0;
  border-left: 10px solid transparent;
  border-right: 10px solid transparent;
  border-bottom: 18px solid #540000;
}

.back-link {
  position: absolute;
  top: 26px;
  left: 5vw;
  text-decoration: none;
  color: #003306;
  font-size: 15px;
  font-weight: 600;
  opacity: 0;
  animation: fadeDown 0.5s ease 0.1s forwards;
}

.back-link:hover { color: #540000; }

.page {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  position: relative;
}

.card {
  background: #ffffff;
  border-radius: 20px;
  padding: 44px 48px 40px;
  width: 100%;
  max-width: 560px;
  box-shadow: 0 4px 32px rgba(0, 51, 6, 0.08);
  opacity: 0;
  animation: fadeUp 0.6s ease 0.2s forwards;
}

.card-title {
  font-size: 26px;
  font-weight: 700;
  color: #540000;
  text-align: center;
  margin-bottom: 6px;
}

.card-subtitle {
  font-size: 14px;
  font-weight: 500;
  color: #666;
  text-align: center;
  margin-bottom: 32px;
}

.field {
  margin-bottom: 20px;
}

label {
  display: block;
  font-size: 15px;
  font-weight: 700;
  color: #540000;
  margin-bottom: 8px;
}

input[type="email"],
input[type="password"],
input[type="text"] {
  width: 100%;
  padding: 14px 18px;
  border: none;
  border-radius: 12px;
  background-color: #f0f0ee;
  font-size: 15px;
  font-family: 'Inter', sans-serif;
  color: #003306;
  outline: none;
  transition: background 0.2s, box-shadow 0.2s;
}

input:focus {
  background-color: #e8f2e0;
  box-shadow: 0 0 0 2px #B5C9A7;
}







.forgot-row {
  display: flex;
  justify-content: flex-end;
  margin-top: 6px;
}

.forgot-link {
  font-size: 13px;
  font-weight: 500;
  color: #888;
  text-decoration: none;
}

.forgot-link:hover { color: #540000; }

.btn-signin {
  width: 100%;
  padding: 15px;
  background-color: #2d6e2d;
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 700;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  margin-top: 28px;
  transition: background 0.2s, transform 0.15s;
}

.btn-signin:hover {
  background-color: #245924;
  transform: translateY(-2px);
}

.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 22px 0;
}

.divider hr {
  flex: 1;
  border: none;
  border-top: 1px solid #ddd;
}

.divider span {
  font-size: 11px;
  font-weight: 600;
  color: #aaa;
  letter-spacing: 0.08em;
  white-space: nowrap;
}

.btn-signup {
  width: 100%;
  padding: 14px;
  background-color: #ece9e2;
  color: #2d6e2d;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 700;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  transition: background 0.2s, transform 0.15s;
}

.btn-signup:hover {
  background-color: #ddd9d0;
  transform: translateY(-2px);
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-10px); }
  to   { opacity: 1; transform: translateY(0); }
}

@media (max-width: 600px) {
  .card { padding: 32px 24px 28px; }
}
</style>
</head>

<body>

<div class="top-bar" style="position:relative;">
<a href="index.html" class="back-link">&lt;Back</a>
<div class="shapes">
<div class="sq"></div>
<div class="circ"></div>
<div class="tri"></div>
</div>
</div>

<div class="page">
<div class="card">
<h1 class="card-title">Join the Community</h1>
<p class="card-subtitle">Your chance to make the next big impact</p>

<div class="field">
<label for="email">Email</label>
<input type="email" id="email" placeholder="arthurweasley@gmail.com" />
</div>

<div class="field">
<label for="password">Password</label>
<div class="password-wrapper">
<input type="password" id="password" placeholder="Enter your password" />

</div>

</div>

<button class="btn-signin" onclick="handleSignIn()">Create Account</button>

<div class="divider">
<hr /><span>ALREADY HAVE AN ACCOUNT?</span><hr />
</div>

<button class="btn-signup" onclick="window.location.href='login.html'">Sign in</button>
</div>
</div>

<script>
function togglePassword() {
const input = document.getElementById('password');
const btn = document.getElementById('eyeBtn');
if (input.type === 'password') {
input.type = 'text';
btn.textContent = '🙈';
} else {
input.type = 'password';
btn.textContent = '👁';
}
}

function handleSignIn() {
const email = document.getElementById('email').value;
const password = document.getElementById('password').value;
if (!email || !password) {
alert('Please fill in both fields.');
return;
}
alert('Signing in as ' + email);
}
</script>

</body>
</html>
